<!DOCTYPE html>
<html lang="en">
<head>
  <title>Active Accounts - VINCENTSENSEI</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff00ff;
      --secondary: #00ffff;
      --tertiary: #ffff00;
      --quaternary: #ff0000;
      --bg-dark: #0a0a0f;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-dark);
      min-height: 100vh;
      overflow-x: hidden;
      perspective: 1000px;
    }
    
    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    
    .bg-animation::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(0, 255, 255, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 0, 255, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 80%, rgba(255, 255, 0, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 255, 0, 0.2) 0%, transparent 50%);
      animation: bgPulse 15s ease-in-out infinite;
    }
    
    @keyframes bgPulse {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(5%, 5%) rotate(5deg); }
      50% { transform: translate(0, 10%) rotate(0deg); }
      75% { transform: translate(-5%, 5%) rotate(-5deg); }
    }
    
    /* Floating Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      animation: float 20s infinite ease-in-out;
      opacity: 0.5;
    }
    
    .orb-1 {
      width: 400px;
      height: 400px;
      background: linear-gradient(45deg, var(--secondary), var(--primary));
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }
    
    .orb-2 {
      width: 300px;
      height: 300px;
      background: linear-gradient(45deg, var(--tertiary), var(--quaternary));
      top: 60%;
      right: 10%;
      animation-delay: -5s;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.1); }
      50% { transform: translate(-20px, 20px) scale(0.9); }
      75% { transform: translate(20px, 30px) scale(1.05); }
    }
    
    /* Main Container */
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 100px 20px 20px;
      position: relative;
    }
    
    /* Title */
    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 40px;
      background: linear-gradient(90deg, var(--secondary), var(--primary), var(--tertiary), var(--secondary));
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbow 5s linear infinite;
      text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
      letter-spacing: 3px;
    }
    
    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }
    
    /* Account Cards */
    .accounts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
      width: 100%;
      max-width: 1200px;
    }
    
    .account-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 25px;
      padding: 25px;
      display: flex;
      align-items: center;
      gap: 20px;
      transform-style: preserve-3d;
      transition: all 0.4s ease;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }
    
    .account-card:hover {
      transform: translateY(-10px) rotateX(5deg);
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.4),
        0 0 30px rgba(0, 255, 255, 0.2);
      border-color: var(--secondary);
    }
    
    .account-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary);
      box-shadow: 0 0 20px var(--primary);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px var(--primary); }
      50% { box-shadow: 0 0 40px var(--primary), 0 0 60px var(--secondary); }
    }
    
    .account-info {
      flex: 1;
    }
    
    .account-info h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      color: #fff;
      margin-bottom: 8px;
    }
    
    .account-info p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .online-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #00ff00, #00ffff);
      color: #000;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
      animation: glow 2s infinite;
    }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 10px #00ff00; }
      50% { box-shadow: 0 0 25px #00ff00, 0 0 35px #00ffff; }
    }
    
    .online-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #000;
      border-radius: 50%;
      animation: blink 1s infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.5);
    }
    
    .empty-state i {
      font-size: 5rem;
      margin-bottom: 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .empty-state h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
    }
    
    .loading i {
      font-size: 3rem;
      color: var(--secondary);
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    
    .nav-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .nav-links {
      display: flex;
      gap: 20px;
    }
    
    .nav-link {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .nav-link:hover {
      color: var(--secondary);
      text-shadow: 0 0 10px var(--secondary);
    }
    
    .nav-link.active {
      color: var(--primary);
    }
    
    /* Footer */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px;
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    }
    
    /* Mobile Responsive */
    @media (max-width: 768px) {
      .title {
        font-size: 1.8rem;
      }
      
      .accounts-grid {
        grid-template-columns: 1fr;
      }
      
      .account-card {
        padding: 20px;
      }
      
      .account-avatar {
        width: 60px;
        height: 60px;
      }
      
      .navbar {
        padding: 10px 15px;
      }
      
      .nav-links {
        gap: 10px;
      }
      
      .nav-link {
        font-size: 0.85rem;
      }
    }
    
    @media (max-width: 480px) {
      .title {
        font-size: 1.5rem;
      }
      
      .account-info h3 {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-animation">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-logo">VINCENTSENSEI</div>
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/active" class="nav-link active">Active</a>
      <a href="/guide" class="nav-link">Guide</a>
    </div>
  </nav>
  
  <div class="container">
    <h1 class="title">Active Bot Accounts</h1>
    <div id="accounts-container">
      <div class="loading">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Loading accounts...</p>
      </div>
    </div>
  </div>
  
  <div class="footer">
    <span id="time"></span> | <span id="ping"></span> | VINCENTSENSEI © 2024
  </div>
  
  <script>
    function updateTime() {
      const now = new Date();
      const options = {
        timeZone: 'Asia/Manila',
        hour12: true,
        hour: 'numeric',
        minute: 'numeric',
        second: 'numeric'
      };
      const formattedTime = now.toLocaleString('en-US', options);
      document.getElementById('time').textContent = formattedTime;
    }
    updateTime();
    setInterval(updateTime, 1000);
    
    function measurePing() {
      var xhr = new XMLHttpRequest();
      var startTime, endTime;
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          endTime = Date.now();
          var pingTime = endTime - startTime;
          document.getElementById("ping").textContent = pingTime + " ms";
        }
      };
      xhr.open("GET", location.href + "?t=" + new Date().getTime());
      startTime = Date.now();
      xhr.send();
    }
    setInterval(measurePing, 1000);
    
    async function loadAccounts() {
      try {
        const response = await fetch('/info');
        const accounts = await response.json();
        const container = document.getElementById('accounts-container');
        
        if (accounts.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-robot"></i>
              <h2>No Active Bots</h2>
              <p>Add a bot through the login page to get started!</p>
            </div>
          `;
          return;
        }
        
        container.innerHTML = '<div class="accounts-grid">';
        
        accounts.forEach(account => {
          const card = document.createElement('div');
          card.className = 'account-card';
          card.innerHTML = `
            <img src="${account.thumbSrc || 'https://via.placeholder.com/80'}" alt="Avatar" class="account-avatar">
            <div class="account-info">
              <h3>${account.name || 'Unknown'}</h3>
              <p><i class="fas fa-clock"></i> Online Time: ${account.time || 0} seconds</p>
            </div>
            <span class="online-badge">Online</span>
          `;
          container.appendChild(card);
        });
        
        container.innerHTML += '</div>';
      } catch (error) {
        console.error('Error loading accounts:', error);
        document.getElementById('accounts-container').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-triangle"></i>
            <h2>Error Loading Accounts</h2>
            <p>Please try again later.</p>
          </div>
        `;
      }
    }
    
    loadAccounts();
    setInterval(loadAccounts, 5000);
  </script>
</body>
</html>
