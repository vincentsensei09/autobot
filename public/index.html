<!DOCTYPE html>
<html lang="en">
<head>
  <title>VINCENTSENSEI - Facebook Bot</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff00ff;
      --secondary: #00ffff;
      --tertiary: #ffff00;
      --quaternary: #ff0000;
      --bg-dark: #0a0a0f;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-dark);
      min-height: 100vh;
      overflow-x: hidden;
      perspective: 1000px;
    }
    
    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    
    .bg-animation::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(255, 0, 255, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 255, 255, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 80%, rgba(255, 255, 0, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255, 0, 0, 0.2) 0%, transparent 50%);
      animation: bgPulse 15s ease-in-out infinite;
    }
    
    @keyframes bgPulse {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(5%, 5%) rotate(5deg); }
      50% { transform: translate(0, 10%) rotate(0deg); }
      75% { transform: translate(-5%, 5%) rotate(-5deg); }
    }
    
    /* Floating Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      animation: float 20s infinite ease-in-out;
      opacity: 0.5;
    }
    
    .orb-1 {
      width: 400px;
      height: 400px;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }
    
    .orb-2 {
      width: 300px;
      height: 300px;
      background: linear-gradient(45deg, var(--tertiary), var(--primary));
      top: 60%;
      right: 10%;
      animation-delay: -5s;
    }
    
    .orb-3 {
      width: 250px;
      height: 250px;
      background: linear-gradient(45deg, var(--secondary), var(--quaternary));
      bottom: 20%;
      left: 30%;
      animation-delay: -10s;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.1); }
      50% { transform: translate(-20px, 20px) scale(0.9); }
      75% { transform: translate(20px, 30px) scale(1.05); }
    }
    
    /* Main Container */
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }
    
    /* 3D Card */
    .main-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
      transform-style: preserve-3d;
      transform: rotateX(5deg);
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.5),
        0 0 100px rgba(255, 0, 255, 0.2),
        inset 0 0 50px rgba(255, 255, 255, 0.05);
      animation: cardFloat 6s ease-in-out infinite;
    }
    
    @keyframes cardFloat {
      0%, 100% { transform: rotateX(5deg) translateY(0); }
      50% { transform: rotateX(5deg) translateY(-10px); }
    }
    
    .main-card:hover {
      transform: rotateX(0deg) scale(1.02);
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.5),
        0 0 150px rgba(0, 255, 255, 0.3),
        inset 0 0 50px rgba(255, 255, 255, 0.05);
    }
    
    /* Title */
    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 10px;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--tertiary), var(--primary));
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbow 5s linear infinite;
      text-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
      letter-spacing: 3px;
    }
    
    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }
    
    .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: 1rem;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }
    
    /* Form Elements */
    .form-group {
      margin-bottom: 20px;
      transform: translateZ(20px);
    }
    
    .form-label {
      display: block;
      color: var(--secondary);
      font-size: 0.9rem;
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    
    .form-input, .form-textarea {
      width: 100%;
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.4);
      border: 2px solid transparent;
      border-radius: 15px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
    }
    
    .form-input:focus, .form-textarea:focus {
      border-color: var(--primary);
      box-shadow: 
        0 0 20px rgba(255, 0, 255, 0.3),
        inset 0 0 20px rgba(255, 0, 255, 0.1);
    }
    
    .form-textarea {
      min-height: 150px;
      resize: vertical;
    }
    
    /* Commands Grid */
    .commands-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .command-checkbox {
      display: none;
    }
    
    .command-label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 15px;
      background: rgba(0, 0, 0, 0.4);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
    }
    
    .command-checkbox:checked + .command-label {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
      transform: scale(1.05);
    }
    
    .command-label:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    
    /* Buttons */
    .btn {
      padding: 15px 40px;
      border: none;
      border-radius: 50px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      width: 100%;
      margin-top: 20px;
      box-shadow: 0 10px 30px rgba(255, 0, 255, 0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(255, 0, 255, 0.5);
    }
    
    .btn-primary:disabled {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.3);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s ease;
    }
    
    .btn:hover::before {
      left: 100%;
    }
    
    /* Checkbox */
    .checkbox-container {
      display: flex;
      align-items: center;
      margin-top: 20px;
      cursor: pointer;
    }
    
    .checkbox-container input {
      display: none;
    }
    
    .checkmark {
      width: 25px;
      height: 25px;
      border: 2px solid var(--secondary);
      border-radius: 5px;
      margin-right: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    
    .checkbox-container input:checked + .checkmark {
      background: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 0 15px var(--primary);
    }
    
    .checkmark::after {
      content: '✓';
      color: #fff;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .checkbox-container input:checked + .checkmark::after {
      opacity: 1;
    }
    
    .checkbox-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
    }
    
    /* Result */
    #result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      display: none;
    }
    
    #result.success {
      display: block;
      background: rgba(0, 255, 0, 0.2);
      border: 1px solid #00ff00;
      color: #00ff00;
    }
    
    #result.error {
      display: block;
      background: rgba(255, 0, 0, 0.2);
      border: 1px solid #ff0000;
      color: #ff0000;
    }
    
    /* Loading */
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 10px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Footer */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px;
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    }
    
    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    
    .nav-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .nav-links {
      display: flex;
      gap: 20px;
    }
    
    .nav-link {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .nav-link:hover {
      color: var(--primary);
      text-shadow: 0 0 10px var(--primary);
    }
    
    /* Mobile Responsive */
    @media (max-width: 768px) {
      .title {
        font-size: 1.8rem;
      }
      
      .main-card {
        padding: 25px;
        margin: 10px;
      }
      
      .commands-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .orb {
        width: 200px;
        height: 200px;
      }
      
      .navbar {
        padding: 10px 15px;
      }
      
      .nav-links {
        gap: 10px;
      }
      
      .nav-link {
        font-size: 0.85rem;
      }
    }
    
    @media (max-width: 480px) {
      .title {
        font-size: 1.5rem;
      }
      
      .subtitle {
        font-size: 0.85rem;
      }
      
      .form-input, .form-textarea {
        padding: 12px 15px;
        font-size: 0.9rem;
      }
      
      .command-label {
        padding: 10px;
        font-size: 0.85rem;
      }
      
      .btn {
        padding: 12px 30px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-animation">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-logo">VINCENTSENSEI</div>
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/active" class="nav-link">Active</a>
      <a href="/guide" class="nav-link">Guide</a>
    </div>
  </nav>
  
  <div class="container">
    <div class="main-card">
      <h1 class="title">VINCENTSENSEI</h1>
      <p class="subtitle">Advanced Facebook Messenger Bot</p>
      
      <div class="form-group">
        <label class="form-label">Appstate JSON</label>
        <textarea id="json-data" class="form-textarea" placeholder='Paste your Facebook appstate JSON here...'></textarea>
      </div>
      
      <div class="form-group">
        <label class="form-label">Commands</label>
        <div class="commands-grid" id="commandsContainer">
          <!-- Commands will be loaded dynamically -->
          <div class="loading">Loading commands...</div>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Prefix</label>
        <input type="text" id="inputOfPrefix" class="form-input" placeholder="/" value="/">
      </div>
      
      <div class="form-group">
        <label class="form-label">Admin UID (Optional)</label>
        <input type="text" id="inputOfAdmin" class="form-input" placeholder="Admin Facebook UID">
      </div>
      
      <label class="checkbox-container">
        <input type="checkbox" id="agreeCheckbox">
        <span class="checkmark"></span>
        <span class="checkbox-text">I agree to the Terms and Conditions</span>
      </label>
      
      <button class="btn btn-primary" onclick="State()" id="submitButton" disabled>Login Bot</button>
      
      <div id="result"></div>
    </div>
  </div>
  
  <div class="footer">
    <span id="time"></span> | <span id="ping"></span> | VINCENTSENSEI © 2024
  </div>
  
  <script src="script.js"></script>
  <script>
    document.getElementById('agreeCheckbox').addEventListener('change', function() {
      document.getElementById('submitButton').disabled = !this.checked;
    });
    
    let Commands = [{ 'commands': [] }, { 'handleEvent': [] }];
    
    function updateTime() {
      const now = new Date();
      const options = {
        timeZone: 'Asia/Manila',
        hour12: true,
        hour: 'numeric',
        minute: 'numeric',
        second: 'numeric'
      };
      const formattedTime = now.toLocaleString('en-US', options);
      document.getElementById('time').textContent = formattedTime;
    }
    updateTime();
    setInterval(updateTime, 1000);
    
    function measurePing() {
      var xhr = new XMLHttpRequest();
      var startTime, endTime;
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          endTime = Date.now();
          var pingTime = endTime - startTime;
          document.getElementById("ping").textContent = pingTime + " ms";
        }
      };
      xhr.open("GET", location.href + "?t=" + new Date().getTime());
      startTime = Date.now();
      xhr.send();
    }
    setInterval(measurePing, 1000);
  </script>
</body>
</html>
